<script>
(function () {

const params = new URLSearchParams(window.location.search);
let video = params.get("v");

if (!video) {
  video = "https://cdn.videy.co/oJwg3WX21.mp4";
}

if (!video.startsWith("http")) {
  video = "https://cdn.videy.co/" + video;
}

const player = document.getElementById("player");
const source = document.getElementById("videoSource");
const loading = document.getElementById("loading");

source.src = video;
player.load();

player.play().catch(() => {});

player.addEventListener("loadeddata", () => {
  loading.style.display = "none";
});

/* blok klik kanan */
player.addEventListener("contextmenu", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

/* blok shortcut save */
document.addEventListener("keydown", function(e){
  if(
    (e.ctrlKey && ['s','u','p'].includes(e.key.toLowerCase())) ||
    e.key === "F12"
  ){
    e.preventDefault();
  }
});

/* blok zoom mobile */
document.addEventListener('gesturestart', function(e){
  e.preventDefault();
});

/* paksa keluar fullscreen */
player.addEventListener('webkitbeginfullscreen', function() {
  this.webkitExitFullscreen && this.webkitExitFullscreen();
});

})();
</script>
